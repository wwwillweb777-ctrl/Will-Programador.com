<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Cadastro de Colaboração</title>
</head>
<body>
    <h2>Cadastro de Colaboração</h2>
    
    <label>Nome Completo:</label><br>
    <input type="text" id="campoNome" placeholder="Digite seu nome" style="margin: 8px 0; padding: 10px; width: 300px;"><br>

    <label>Valor da Colaboração (R$):</label><br>
    <input type="text" id="campoValor" placeholder="Ex: 50,00" style="margin: 8px 0; padding: 10px; width: 300px;"><br><br>

    <button onclick="salvarDados()" style="padding: 12px 30px; background: #165DFF; color: white; border: none; border-radius: 5px; font-size: 16px;">
        Salvar Dados
    </button>

<script>
// URL CONFIGURADA CORRETAMENTE
const URL_API = "https://script.google.com/macros/s/AKfycbwcVHuPuEU1W6hQTW95PqoousxW59EULz8kQettNlAIO2DI0SfWnMQgUrQgl9JNwO1X/exec";

async function salvarDados() {
    const nome = document.getElementById("campoNome").value.trim();
    const valor = document.getElementById("campoValor").value.trim();

    if(!nome || !valor) {
        alert("Preencha todos os campos!");
        return;
    }

    try {
        await fetch(URL_API, {
            method: "POST",
            body: JSON.stringify({
                nome: nome,
                valor: valor
            })
        });

        alert("Dados salvos com sucesso! ✅");
        document.getElementById("campoNome").value = "";
        document.getElementById("campoValor").value = "";

    } catch(erro) {
        alert("Erro! Verifique sua conexão.");
    }
}
</script>
</body>
</html>
